<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Job Tracker{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --page-bg: #f6f8fb;
            --ink: #172033;
            --muted: #667085;
            --line: #dce3ee;
            --panel: #ffffff;
            --brand: #176b87;
            --brand-dark: #0e5065;
            --accent: #f4a261;
            --success: #2a9d8f;
            --danger: #d94f4f;
            --shadow: 0 18px 45px rgba(23, 32, 51, 0.10);
        }

        * {
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            margin: 0;
            font-family: "Inter", Arial, sans-serif;
            color: var(--ink);
            background:
                radial-gradient(circle at top left, rgba(23, 107, 135, 0.14), transparent 32rem),
                linear-gradient(135deg, #f6f8fb 0%, #eef4f8 48%, #f9f6ef 100%);
        }

        a {
            text-decoration: none;
        }

        .app-shell {
            min-height: 100vh;
        }

        .topbar {
            position: sticky;
            top: 0;
            z-index: 10;
            border-bottom: 1px solid rgba(220, 227, 238, 0.82);
            background: rgba(255, 255, 255, 0.86);
            backdrop-filter: blur(16px);
        }

        .brand-mark {
            width: 42px;
            height: 42px;
            display: grid;
            place-items: center;
            border-radius: 8px;
            color: #fff;
            background: linear-gradient(135deg, var(--brand), var(--success));
            box-shadow: 0 10px 24px rgba(23, 107, 135, 0.25);
        }

        .brand-title {
            font-weight: 800;
            line-height: 1;
        }

        .brand-subtitle {
            color: var(--muted);
            font-size: 0.82rem;
        }

        .page-wrap {
            width: min(1120px, calc(100% - 32px));
            margin: 0 auto;
            padding: 32px 0 48px;
        }

        .surface {
            border: 1px solid rgba(220, 227, 238, 0.92);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.92);
            box-shadow: var(--shadow);
        }

        .btn-brand {
            border: 0;
            color: #fff;
            background: var(--brand);
        }

        .btn-brand:hover,
        .btn-brand:focus {
            color: #fff;
            background: var(--brand-dark);
        }

        .btn-soft {
            border: 1px solid var(--line);
            color: var(--ink);
            background: #fff;
        }

        .btn-soft:hover,
        .btn-soft:focus {
            border-color: #b8c5d6;
            background: #f8fafc;
        }

        .icon-btn {
            width: 38px;
            height: 38px;
            display: inline-grid;
            place-items: center;
            border-radius: 8px;
        }

        .form-control,
        .form-select,
        input,
        select,
        textarea {
            width: 100%;
            min-height: 44px;
            border: 1px solid var(--line);
            border-radius: 8px;
            padding: 10px 12px;
            color: var(--ink);
            background: #fff;
            outline: none;
        }

        textarea {
            min-height: 120px;
        }

        input:focus,
        select:focus,
        textarea:focus {
            border-color: var(--brand);
            box-shadow: 0 0 0 4px rgba(23, 107, 135, 0.12);
        }

        label {
            margin-bottom: 7px;
            font-size: 0.9rem;
            font-weight: 700;
        }

        .form-help {
            color: var(--muted);
            font-size: 0.92rem;
        }

        .auth-page {
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
        }

        .auth-card {
            width: min(460px, 100%);
            padding: 34px;
        }

        @media (max-width: 768px) {
            .page-wrap {
                width: min(100% - 20px, 1120px);
                padding-top: 20px;
            }

            .topbar .container-fluid {
                align-items: flex-start !important;
                gap: 14px;
            }

            .auth-card {
                padding: 24px;
            }
        }
    </style>
</head>
<body>
{% block body %}
<div class="app-shell">
    <nav class="topbar">
        <div class="container-fluid px-3 px-md-4 py-3 d-flex justify-content-between align-items-center">
            <a href="{% url 'job_list' %}" class="d-flex align-items-center gap-3 text-reset">
                <span class="brand-mark"><i class="bi bi-briefcase-fill"></i></span>
                <span>
                    <span class="brand-title d-block">Job Tracker</span>
                    <span class="brand-subtitle">Applications, interviews, offers</span>
                </span>
            </a>

            {% if user.is_authenticated %}
            <div class="d-flex align-items-center gap-2 flex-wrap justify-content-end">
                <span class="text-secondary small">Hi, {{ user.username }}</span>
                <a href="{% url 'add_job' %}" class="btn btn-brand btn-sm">
                    <i class="bi bi-plus-lg me-1"></i>Add Job
                </a>
                <form action="/logout/" method="POST" class="m-0">
                    {% csrf_token %}
                    <button class="btn btn-soft btn-sm" type="submit">
                        <i class="bi bi-box-arrow-right me-1"></i>Logout
                    </button>
                </form>
            </div>
            {% endif %}
        </div>
    </nav>

    <main class="page-wrap">
        {% block content %}{% endblock %}
    </main>
</div>
{% endblock %}
</body>
</html>
